<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple player · 2C.mp3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* formal card with a whisper of childhood */
        .player-card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.02);
            padding: 32px 28px 38px;
            transition: all 0.2s;
            border: 1px solid #e9edf2;
        }

        /* formal header */
        .formal-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 2px solid #eaeef3;
            padding-bottom: 14px;
            margin-bottom: 24px;
        }

        .title-section h3 {
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #6c7a8e;
            text-transform: uppercase;
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e2a3e;
            margin-top: 4px;
            letter-spacing: -0.3px;
        }

        .kid-touch {
            background: #fef3c7;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* song badge */
        .song-badge {
            background: #f8fafc;
            border-radius: 100px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            width: 100%;
            justify-content: center;
        }

        .song-badge span:first-child {
            font-weight: 500;
            color: #1e293b;
        }

        .song-name {
            font-family: monospace;
            font-weight: 600;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #0f3b5c;
        }

        /* main play button — minimal but friendly */
        .play-section {
            display: flex;
            justify-content: center;
            margin: 16px 0 20px;
        }

        .play-btn {
            background: #1e2a3e;
            border: none;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .play-btn:hover {
            background: #2c3e50;
            transform: scale(1.02);
        }

        .play-btn:active {
            transform: scale(0.96);
        }

        /* progress + time — clean */
        .progress-area {
            margin: 12px 0 8px;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5b6e8c;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #e2e8f0;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #2c3e50;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* volume & restart row: formal + cute icon */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9fbfd;
            border-radius: 60px;
            padding: 10px 18px;
            margin-top: 24px;
            border: 1px solid #edf2f7;
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-icon {
            font-size: 1.2rem;
            color: #4b6b8f;
        }

        .volume-slider {
            width: 110px;
            margin: 0;
        }

        .restart-btn {
            background: transparent;
            border: 1px solid #cfdfed;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c4c6e;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .restart-btn:hover {
            background: #eef3fc;
        }

        /* little kid whisper */
        .kid-whisper {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #8ca0b8;
            border-top: 1px solid #ecf3f9;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .kid-whisper span {
            background: #fef7e0;
            padding: 4px 12px;
            border-radius: 60px;
        }

        /* status / subtle hint */
        .info-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #7f8c9a;
            background: #f8fafc;
            border-radius: 40px;
            padding: 6px;
        }
    </style>
</head>
<body>
<div class="player-card">
    <div class="formal-header">
        <div class="title-section">
            <h3>♫  audio player</h3>
            <h1>2C · track</h1>
        </div>
        <div class="kid-touch">
            🧸 ✨
        </div>
    </div>

    <div class="song-badge">
        <span>📀 currently loaded</span>
        <span class="song-name">2C.mp3</span>
    </div>

    <!-- hidden audio element -->
    <audio id="audioPlayer" src="2C.mp3" preload="auto"></audio>

    <div class="play-section">
        <button class="play-btn" id="playPauseBtn">▶</button>
    </div>

    <div class="progress-area">
        <div class="time-row">
            <span id="currentTimeLabel">0:00</span>
            <span id="durationLabel">0:00</span>
        </div>
        <input type="range" id="progressSlider" value="0" step="0.01">
    </div>

    <div class="control-row">
        <div class="volume-wrap">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
        <button class="restart-btn" id="restartBtn">
            ⟳ restart
        </button>
    </div>

    <div class="kid-whisper">
        <span>🎵  little melody  🎵</span>
        <span>🐣  soft & simple  🐣</span>
    </div>
    <div class="info-note" id="infoMessage">
        📁 place "2C.mp3" in same folder → then press play
    </div>
</div>

<script>
    (function() {
        // get elements
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const progressSlider = document.getElementById('progressSlider');
        const currentLabel = document.getElementById('currentTimeLabel');
        const durationLabel = document.getElementById('durationLabel');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIconSpan = document.getElementById('volumeIcon');
        const restartBtn = document.getElementById('restartBtn');
        const infoMsg = document.getElementById('infoMessage');

        let isPlaying = false;

        // Helper: format seconds to mm:ss
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // update progress bar & time display
        function updateProgress() {
            if (!isNaN(audio.duration) && isFinite(audio.duration) && audio.duration > 0) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressSlider.value = percent;
                currentLabel.innerText = formatTime(audio.currentTime);
                durationLabel.innerText = formatTime(audio.duration);
            } else {
                currentLabel.innerText = formatTime(audio.currentTime);
                if (!isNaN(audio.duration) && isFinite(audio.duration)) {
                    durationLabel.innerText = formatTime(audio.duration);
                } else {
                    durationLabel.innerText = "0:00";
                }
            }
        }

        // when metadata is loaded (duration known)
        function onMetadataLoaded() {
            if (!isNaN(audio.duration) && isFinite(audio.duration) && audio.duration > 0) {
                durationLabel.innerText = formatTime(audio.duration);
                progressSlider.max = 100;
                progressSlider.value = 0;
                infoMsg.innerHTML = "✅ ready to play · 2C.mp3 loaded";
                setTimeout(() => {
                    if (infoMsg.innerHTML.includes("loaded")) infoMsg.innerHTML = "🎧 click play · enjoy the track";
                }, 2200);
            } else {
                durationLabel.innerText = "0:00";
                infoMsg.innerHTML = "⚠️ 2C.mp3 not found? keep file in same folder";
            }
        }

        // error handler (missing file / format)
        function onAudioError() {
            infoMsg.innerHTML = "❌ cannot play 2C.mp3 · check file name & location";
            infoMsg.style.background = "#ffe6e5";
            playBtn.disabled = false;
        }

        // toggle play/pause
        function togglePlay() {
            if (!audio.src || audio.src === "" || audio.readyState === 0) {
                infoMsg.innerHTML = "📂 2C.mp3 missing? place it in same folder as this html";
                return;
            }
            if (isPlaying) {
                audio.pause();
            } else {
                const promise = audio.play();
                if (promise !== undefined) {
                    promise.catch(err => {
                        console.warn(err);
                        if (err.name === "NotAllowedError") {
                            infoMsg.innerHTML = "🔊 click again (browser needs interaction)";
                        } else {
                            infoMsg.innerHTML = "⚠️ playback error · verify 2C.mp3";
                        }
                    });
                }
            }
        }

        // update button icon and internal state
        function updatePlayUI() {
            if (isPlaying) {
                playBtn.innerHTML = "⏸";
            } else {
                playBtn.innerHTML = "▶";
            }
        }

        // audio event listeners
        function bindAudioEvents() {
            audio.addEventListener('play', () => {
                isPlaying = true;
                updatePlayUI();
                infoMsg.innerHTML = "🎶 playing · 2C";
                setTimeout(() => {
                    if (infoMsg.innerHTML.includes("playing")) infoMsg.innerHTML = "♫  have a nice listen  ♫";
                }, 1800);
            });
            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayUI();
            });
            audio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayUI();
                progressSlider.value = 0;
                currentLabel.innerText = "0:00";
                infoMsg.innerHTML = "🏁 song finished · press play again";
            });
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', onMetadataLoaded);
            audio.addEventListener('error', onAudioError);
        }

        // seek when slider changes
        function seekTrack(e) {
            if (audio.duration && !isNaN(audio.duration) && isFinite(audio.duration)) {
                const percent = parseFloat(progressSlider.value) / 100;
                audio.currentTime = percent * audio.duration;
            } else {
                progressSlider.value = 0;
            }
        }

        // volume management + icon (formal but cute)
        function updateVolumeIcon(vol) {
            if (vol === 0 || audio.volume === 0) {
                volumeIconSpan.innerHTML = "🔇";
            } else if (vol < 0.5) {
                volumeIconSpan.innerHTML = "🔉";
            } else {
                volumeIconSpan.innerHTML = "🔊";
            }
        }

        function setVolume(value) {
            let newVol = Math.min(1, Math.max(0, parseFloat(value)));
            audio.volume = newVol;
            volumeSlider.value = newVol;
            updateVolumeIcon(newVol);
        }

        // restart from beginning
        function restartCurrent() {
            if (audio.src && audio.src !== "" && audio.readyState > 0) {
                audio.currentTime = 0;
                if (!isPlaying) {
                    currentLabel.innerText = formatTime(0);
                    progressSlider.value = 0;
                }
                infoMsg.innerHTML = "↺ restart · back to start";
                setTimeout(() => {
                    if (infoMsg.innerHTML.includes("restart")) infoMsg.innerHTML = "🎵  enjoy the song  🎵";
                }, 1500);
            } else {
                infoMsg.innerHTML = "⚠️ no track loaded · place 2C.mp3";
            }
        }

        // ---- initial setup ----
        audio.volume = 0.7;
        volumeSlider.value = 0.7;
        setVolume(0.7);
        bindAudioEvents();

        // UI event listeners
        playBtn.addEventListener('click', togglePlay);
        progressSlider.addEventListener('input', seekTrack);
        volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));
        restartBtn.addEventListener('click', restartCurrent);

        // small check after initial load to hint about file
        setTimeout(() => {
            if ((!audio.src || audio.src === "") || (audio.readyState === 0 && !audio.currentSrc)) {
                infoMsg.innerHTML = "📁 hint: put '2C.mp3' next to this file · then refresh & play";
            } else if (audio.networkState === audio.NETWORK_NO_SOURCE) {
                infoMsg.innerHTML = "📁 file '2C.mp3' not found · check spelling & folder";
            } else {
                // file exists but maybe not loaded fully
                if (audio.readyState === 0) infoMsg.innerHTML = "⏳ loading 2C.mp3 ... ready soon";
            }
        }, 400);
    })();
</script>
</body>
</html>
