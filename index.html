<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2C</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #ff9d00;
    --accent2: #ffc400;
    --menu-w: 270px;
    --menu-w-sm: 74px;
    --radius: 14px;
    --transition: 0.38s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    display: flex;
    height: 100vh;
    font-family: 'Nunito', sans-serif;
    background: #eef4fb;
}

/* ═══════════════════════════════
   SIDEBAR
═══════════════════════════════ */
#menu {
    width: var(--menu-w);
    min-width: var(--menu-w);
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #1a2540;
    position: relative;
    z-index: 100;
    transition: width var(--transition), min-width var(--transition);
    overflow: hidden; /* NO scroll ever */
    flex-shrink: 0;
}

/* Rainbow top accent */
#menu::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff9d00, #ffd000, #4ec76a, #3d8fe0, #a855f7);
    z-index: 10;
    flex-shrink: 0;
}

/* Subtle grid texture */
#menu::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
}

#menu.contracted {
    width: var(--menu-w-sm);
    min-width: var(--menu-w-sm);
}

/* ── HEADER ── */
.menu-header {
    display: flex;
    align-items: center;
    padding: 18px 16px 14px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
}

.logo-badge {
    width: 42px;
    height: 42px;
    min-width: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #1a2540;
    font-weight: 900;
    box-shadow: 0 4px 14px rgba(255,157,0,0.35);
    flex-shrink: 0;
    letter-spacing: -0.5px;
}

.header-text {
    overflow: hidden;
    white-space: nowrap;
    transition: opacity var(--transition), width var(--transition);
}

.header-text h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #ffffff;
    letter-spacing: 0.5px;
    line-height: 1;
    margin-bottom: 2px;
}

.header-text p {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

#menu.contracted .header-text {
    opacity: 0;
    width: 0;
}

/* ── TOGGLE ── */
#toggle-container {
    padding: 10px 14px 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

#toggle-btn {
    width: 100%;
    height: 38px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
    touch-action: manipulation;
    overflow: hidden;
    white-space: nowrap;
}

#toggle-btn:hover {
    background: rgba(255,157,0,0.15);
    border-color: rgba(255,157,0,0.4);
    color: var(--accent);
}

.toggle-icon {
    font-size: 1rem;
    flex-shrink: 0;
    transition: transform 0.38s ease;
}

#menu.contracted .toggle-icon {
    transform: rotate(180deg);
}

.toggle-label {
    transition: opacity var(--transition), width var(--transition);
    overflow: hidden;
}

#menu.contracted .toggle-label {
    opacity: 0;
    width: 0;
}

/* ── SECTION LABEL ── */
.section-label {
    padding: 8px 18px 4px;
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.25);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    white-space: nowrap;
    overflow: hidden;
    transition: opacity var(--transition);
}

#menu.contracted .section-label {
    opacity: 0;
}

/* ── MENU ITEMS ── */
.menu-items-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 10px 10px;
    gap: 3px;
    position: relative;
    z-index: 2;
    min-height: 0;
    overflow: hidden; /* never scroll */
}

.menu-link {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 12px;
    border-radius: 11px;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    font-weight: 700;
    font-size: 0.88rem;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
    border: 1px solid transparent;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    /* KEY: each item grows equally — no scroll needed */
    flex: 1;
    min-height: 0;
    animation: slideIn 0.35s ease both;
}

/* Left accent bar */
.menu-link::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: currentColor;
    transform: scaleY(0);
    transition: transform 0.25s ease;
}

.menu-link:hover::before,
.menu-link.active::before {
    transform: scaleY(1);
}

.menu-link:hover {
    background: rgba(255,255,255,0.07);
    color: #ffffff;
    border-color: rgba(255,255,255,0.08);
}

.menu-link.active {
    background: rgba(255,255,255,0.1);
    color: #ffffff;
    border-color: rgba(255,255,255,0.12);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.link-icon {
    font-size: 1.2rem;
    min-width: 38px;
    text-align: center;
    flex-shrink: 0;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    transition: transform 0.2s ease;
}

.menu-link:hover .link-icon,
.menu-link.active .link-icon {
    transform: scale(1.15);
}

.link-text {
    overflow: hidden;
    transition: opacity var(--transition), max-width var(--transition);
    max-width: 200px;
    opacity: 1;
    font-size: 0.88rem;
    font-weight: 700;
}

#menu.contracted .link-text {
    opacity: 0;
    max-width: 0;
}

/* Active dot */
.link-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
    opacity: 0;
    transition: opacity 0.2s;
}

.menu-link.active .link-dot { opacity: 1; }
#menu.contracted .link-dot  { display: none; }

/* Tooltip when contracted */
#menu.contracted .menu-link::after {
    content: attr(data-tooltip);
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%) translateX(-6px);
    background: #1a2540;
    color: white;
    padding: 7px 14px;
    border-radius: 9px;
    font-size: 0.82rem;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,157,0,0.4);
}

#menu.contracted .menu-link:hover::after {
    opacity: 1;
    visibility: visible;
    transform: translateY(-50%) translateX(0);
}

/* Per-item accent colors */
.btn-schedule { color: #4ade80; }
.btn-keyboard { color: #60a5fa; }
.btn-plants   { color: #34d399; }
.btn-vocab    { color: #fb923c; }
.btn-math     { color: #c084fc; }
.btn-trans    { color: #94a3b8; }
.btn-words    { color: #2dd4bf; }
.btn-grammar  { color: #f87171; }
.btn-goal     { color: #fbbf24; }
.btn-puzzle   { color: #22d3ee; }
.btn-games    { color: #f472b6; }

/* ── FOOTER ── */
.menu-footer {
    padding: 10px 14px 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
}

.footer-avatar {
    width: 32px;
    height: 32px;
    min-width: 32px;
    background: linear-gradient(135deg, #4ade80, #3d8fe0);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
}

.footer-text {
    overflow: hidden;
    transition: opacity var(--transition);
}

.footer-text p {
    font-size: 0.72rem;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
}

.footer-text span {
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
}

#menu.contracted .footer-text { opacity: 0; }

/* ═══════════════════════════════
   CONTENT
═══════════════════════════════ */
#content-wrapper {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
    background: #eef4fb;
}

#content-frame {
    flex-grow: 1;
    border: none;
    width: 100%;
    height: 100%;
    display: block;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    background: #ffffff;
    border-radius: 20px 0 0 20px;
    box-shadow: -8px 0 40px rgba(0,0,0,0.08);
}

/* ═══════════════════════════════
   ANIMATIONS
═══════════════════════════════ */
@keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
}

.menu-link:nth-child(1)  { animation-delay: 0.04s; }
.menu-link:nth-child(2)  { animation-delay: 0.08s; }
.menu-link:nth-child(3)  { animation-delay: 0.12s; }
.menu-link:nth-child(4)  { animation-delay: 0.16s; }
.menu-link:nth-child(5)  { animation-delay: 0.20s; }
.menu-link:nth-child(6)  { animation-delay: 0.24s; }
.menu-link:nth-child(7)  { animation-delay: 0.28s; }
.menu-link:nth-child(8)  { animation-delay: 0.32s; }
.menu-link:nth-child(9)  { animation-delay: 0.36s; }
.menu-link:nth-child(10) { animation-delay: 0.40s; }
.menu-link:nth-child(11) { animation-delay: 0.44s; }

@keyframes ripple {
    from { transform: scale(0); opacity: 0.3; }
    to   { transform: scale(3); opacity: 0; }
}
.ripple-el {
    position: absolute;
    border-radius: 50%;
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.25);
    animation: ripple 0.5s ease-out forwards;
    pointer-events: none;
    margin-left: -25px;
    margin-top: -25px;
}

/* Responsive */
@media (max-width: 900px) {
    :root { --menu-w: 74px; }
    #menu:not(.contracted) { width: 74px; min-width: 74px; }
}
</style>
</head>

<body>

<nav id="menu">
    <div class="menu-header">
        <div class="logo-badge">2C</div>
        <div class="header-text">
            <h1>Class 2C</h1>
            <p>Learning Hub</p>
        </div>
    </div>

    <div id="toggle-container">
        <button id="toggle-btn" onclick="toggleMenu()" aria-label="Toggle menu">
            <span class="toggle-icon">◀</span>
            <span class="toggle-label">Collapse</span>
        </button>
    </div>

    <div class="section-label">Navigation</div>

    <div class="menu-items-container">
        <a href="schedule.html" target="content-view" class="menu-link btn-schedule active" data-tooltip="Schedule">
            <span class="link-icon">📅</span>
            <span class="link-text">Schedule</span>
            <span class="link-dot"></span>
        </a>
        <a href="keyboard.html" target="content-view" class="menu-link btn-keyboard" data-tooltip="Keyboard">
            <span class="link-icon">⌨️</span>
            <span class="link-text">Keyboard</span>
            <span class="link-dot"></span>
        </a>
        <a href="recycle2.html" target="content-view" class="menu-link btn-plants" data-tooltip="Project">
            <span class="link-icon">🌱</span>
            <span class="link-text">Project</span>
            <span class="link-dot"></span>
        </a>
        <a href="build.html" target="content-view" class="menu-link btn-vocab" data-tooltip="Vocabulary">
            <span class="link-icon">📚</span>
            <span class="link-text">Vocabulary</span>
            <span class="link-dot"></span>
        </a>
        <a href="place.html" target="content-view" class="menu-link btn-math" data-tooltip="Subtraction">
            <span class="link-icon">➖</span>
            <span class="link-text">Subtraction</span>
            <span class="link-dot"></span>
        </a>
        <a href="tracing.html" target="content-view" class="menu-link btn-trans" data-tooltip="Tracing">
            <span class="link-icon">✍️</span>
            <span class="link-text">Tracing</span>
            <span class="link-dot"></span>
        </a>
        <a href="words2.html" target="content-view" class="menu-link btn-words" data-tooltip="Word Bank">
            <span class="link-icon">🗂️</span>
            <span class="link-text">Word Bank</span>
            <span class="link-dot"></span>
        </a>
        <a href="grammar.html" target="content-view" class="menu-link btn-grammar" data-tooltip="Checker">
            <span class="link-icon">✔️</span>
            <span class="link-text">Checker</span>
            <span class="link-dot"></span>
        </a>
        <a href="goal.html" target="content-view" class="menu-link btn-goal" data-tooltip="Weekly Goal">
            <span class="link-icon">🎯</span>
            <span class="link-text">Weekly Goal</span>
            <span class="link-dot"></span>
        </a>
        <a href="puzzle.html" target="content-view" class="menu-link btn-puzzle" data-tooltip="Puzzle">
            <span class="link-icon">🧩</span>
            <span class="link-text">Puzzle</span>
            <span class="link-dot"></span>
        </a>
        <a href="games.html" target="content-view" class="menu-link btn-games" data-tooltip="Games">
            <span class="link-icon">🎮</span>
            <span class="link-text">Games</span>
            <span class="link-dot"></span>
        </a>
    </div>

    <div class="menu-footer">
        <div class="footer-avatar">🏫</div>
        <div class="footer-text">
            <p>Classroom</p>
            <span>Interactive Board</span>
        </div>
    </div>
</nav>

<div id="content-wrapper">
    <iframe name="content-view" id="content-frame" src="schedule.html" title="Classroom Content"></iframe>
</div>

<script>
function toggleMenu() {
    const menu  = document.getElementById('menu');
    const btn   = document.getElementById('toggle-btn');
    const label = btn.querySelector('.toggle-label');
    menu.classList.toggle('contracted');
    const contracted = menu.classList.contains('contracted');
    btn.setAttribute('aria-label', contracted ? 'Expand menu' : 'Collapse menu');
    if (label) label.textContent = contracted ? 'Expand' : 'Collapse';
}

function addRipple(e, el) {
    const r = document.createElement('span');
    r.classList.add('ripple-el');
    const rect = el.getBoundingClientRect();
    const x = (e.clientX ?? e.touches?.[0]?.clientX ?? rect.left + rect.width / 2) - rect.left;
    const y = (e.clientY ?? e.touches?.[0]?.clientY ?? rect.top + rect.height / 2) - rect.top;
    r.style.left = x + 'px';
    r.style.top  = y + 'px';
    el.appendChild(r);
    setTimeout(() => r.remove(), 550);
}

document.addEventListener('DOMContentLoaded', function () {
    const links = document.querySelectorAll('.menu-link');
    const frame = document.getElementById('content-frame');
    const menu  = document.getElementById('menu');

    frame.addEventListener('load', function () {
        try { frame.contentWindow.scrollTo(0, 0); } catch(e) {}
        const cur = frame.src.split('/').pop();
        links.forEach(l => {
            l.classList.toggle('active', l.getAttribute('href') === cur);
        });
    });

    links.forEach(link => {
        link.addEventListener('touchstart', e => addRipple(e, link), { passive: true });
        link.addEventListener('click', function (e) {
            addRipple(e, this);
            links.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            try { frame.contentWindow.scrollTo(0, 0); } catch(e) {}
        });
    });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'm') { e.preventDefault(); toggleMenu(); }
    });

    function checkSize() {
        if (window.innerWidth < 900 && !menu.classList.contains('contracted')) toggleMenu();
    }
    checkSize();
    window.addEventListener('resize', checkSize);
});
</script>

</body>
</html>
