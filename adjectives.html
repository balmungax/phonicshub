<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Adjective Quest: Match & Learn</title>
    <style>
        /* GLOBAL FIX: Century Gothic as primary font */
        * {
            box-sizing: border-box;
            user-select: none; /* prevents text selection while dragging */
            font-family: 'Century Gothic', 'Segoe UI', 'Franklin Gothic Medium', 'Apple Gothic', 'Gill Sans', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f2efe0 0%, #e6dbc9 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* main card */
        .learning-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 253, 245, 0.96);
            border-radius: 70px 70px 60px 60px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2), 0 5px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        /* header */
        .game-header {
            background: #f3a257;
            background: linear-gradient(125deg, #ff9f4a, #ff7e33);
            padding: 22px 20px 18px;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 0 #b45a1a;
        }

        .game-header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            font-weight: 700;
            font-family: 'Century Gothic', 'Segoe UI', sans-serif;
        }

        .game-header p {
            margin: 8px 0 0;
            font-size: 1.15rem;
            font-weight: bold;
            opacity: 0.95;
        }

        /* interactive zone */
        .interactive-zone {
            padding: 30px 25px 25px;
        }

        /* picture + sentence panel */
        .sentence-panel {
            background: #fffbf2;
            border-radius: 70px;
            padding: 25px 20px;
            margin-bottom: 30px;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.06);
            border: 2px solid #ffcf8e;
            text-align: center;
        }

        .picture-emoji {
            font-size: 7rem;
            background: #fef3e4;
            display: inline-block;
            padding: 15px 28px;
            border-radius: 110px;
            margin-bottom: 15px;
            box-shadow: inset 0 -1px 0 #e9cfa8, 0 10px 15px rgba(0,0,0,0.05);
        }

        .sentence-text {
            font-size: 2.1rem;
            font-weight: bold;
            color: #3e2a1c;
            background: #fff7ec;
            padding: 14px 24px;
            border-radius: 70px;
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            margin-top: 8px;
        }

        .sentence-fixed {
            font-size: 2.1rem;
        }

        .dropzone {
            display: inline-block;
            min-width: 160px;
            background: #ffffff;
            border: 3px dashed #ffa451;
            border-radius: 50px;
            padding: 6px 22px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            color: #2b4a2b;
            box-shadow: inset 0 1px 3px #0001, 0 3px 6px #ffe0b5;
            transition: all 0.1s;
            cursor: grab;
            background-color: #fffdf6;
            font-family: 'Century Gothic', monospace;
        }

        .dropzone.drag-over {
            background: #ffefcf;
            border-color: #ff872e;
            transform: scale(1.01);
        }

        /* adjectives pool */
        .adjectives-pool {
            background: #fff7ea;
            border-radius: 55px;
            padding: 20px 18px;
            margin: 20px 0 20px;
            border: 1px solid #ffdbaa;
        }

        .adjectives-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #bc6f2c;
            text-align: center;
            margin-bottom: 18px;
        }

        .drag-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .adjective-tile {
            background: #ffefd0;
            border-radius: 60px;
            padding: 12px 26px;
            font-size: 1.7rem;
            font-weight: bold;
            text-align: center;
            color: #4f2f18;
            box-shadow: 0 6px 0 #c2925b;
            cursor: grab;
            transition: 0.05s linear;
            display: inline-block;
            min-width: 120px;
            border: 1px solid #f9bc72;
            font-family: 'Century Gothic', monospace;
        }

        .adjective-tile:active {
            cursor: grabbing;
        }

        .adjective-tile.dragging {
            opacity: 0.5;
        }

        /* feedback area */
        .feedback-area {
            background: #f4e8db;
            border-radius: 55px;
            padding: 14px 20px;
            margin: 20px 0;
            text-align: center;
            font-size: 1.35rem;
            font-weight: bold;
            color: #2a6b3a;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* navigation buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #f28b3a;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 45px;
            color: white;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 5px 0 #aa5e1c;
            font-family: 'Century Gothic', 'Segoe UI', sans-serif;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5e1c;
        }

        .reset-drop-btn {
            background: #6688a3;
            box-shadow: 0 5px 0 #3d5b74;
        }

        .counter {
            background: #e7cfb0;
            border-radius: 50px;
            padding: 8px 24px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #593d20;
            font-family: 'Century Gothic', monospace;
        }

        @media (max-width: 680px) {
            .sentence-text { font-size: 1.5rem; }
            .dropzone { font-size: 1.5rem; min-width: 130px; padding: 4px 18px; }
            .adjective-tile { font-size: 1.25rem; padding: 8px 18px; min-width: 100px; }
            .picture-emoji { font-size: 4.8rem; }
            .game-header h1 { font-size: 1.7rem; }
            button { font-size: 1rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>

<div class="learning-card">
    <div class="game-header">
        <h1>✏️ Adjective Adventure 🎯</h1>
        <p>✨ Drag the correct adjective into the blank — one by one! ✨</p>
    </div>

    <div class="interactive-zone">
        <!-- Image & sentence block -->
        <div class="sentence-panel">
            <div class="picture-emoji" id="itemEmoji">📦</div>
            <div class="sentence-text">
                <span class="sentence-fixed" id="itemName">The box</span>
                <span>is</span>
                <span id="dropZone" class="dropzone" dropzone="move">______</span>
                <span>.</span>
            </div>
        </div>

        <!-- Draggable adjectives -->
        <div class="adjectives-pool">
            <div class="adjectives-title">🎨 Drag a word below to the blank ⭐</div>
            <div class="drag-grid" id="adjectivesContainer"></div>
        </div>

        <!-- feedback message -->
        <div class="feedback-area" id="feedbackMsg">
            💡 Drop an adjective into the dashed area!
        </div>

        <!-- navigation + clear -->
        <div class="nav-buttons">
            <button id="prevBtn" aria-label="Previous">◀ PREV</button>
            <span class="counter" id="itemCounter">1 / 15</span>
            <button id="nextBtn" aria-label="Next">NEXT ▶</button>
            <button id="resetDropBtn" class="reset-drop-btn">⟳ Clear Blank</button>
        </div>
        <div style="text-align: center; margin-top: 18px; font-size: 0.85rem; color: #b35f1a; font-family: 'Century Gothic', sans-serif;">
            💪 Match each picture with the best adjective. Press NEXT to continue, one by one.
        </div>
    </div>
</div>

<script>
    // ---------- ENHANCED EXAMPLES (pencil is "sharpened" as requested) ----------
    // All adjectives used: full, short, empty, happy, big, tall, hot, cold, sad, little, sharpened
    // "short" appears in crayon example, "sharpened" for pencil.
    
    const items = [
        { name: "The box", emoji: "📦", correct: "full" },
        { name: "The elephant", emoji: "🐘", correct: "big" },
        { name: "The pencil", emoji: "✏️", correct: "sharpened" },        // ✅ fixed: sharpened (like "sharpened pencil")
        { name: "The giraffe", emoji: "🦒", correct: "tall" },
        { name: "The glass", emoji: "🥛", correct: "empty" },
        { name: "The sun", emoji: "☀️", correct: "hot" },
        { name: "The boy", emoji: "👦", correct: "happy" },
        { name: "The girl", emoji: "👧", correct: "sad" },
        { name: "The snow", emoji: "❄️", correct: "cold" },
        { name: "The hamster", emoji: "🐹", correct: "little" },
        // Additional examples for extra practice
        { name: "The cup", emoji: "🥤", correct: "full" },
        { name: "The fire", emoji: "🔥", correct: "hot" },
        { name: "The tree", emoji: "🌳", correct: "tall" },
        { name: "The mouse", emoji: "🐭", correct: "little" },
        { name: "The crayon", emoji: "🖍️", correct: "short" }      // short crayon
    ];

    // Complete list of draggable adjectives (includes sharpened instead of sharp)
    const allAdjectives = ["full", "short", "empty", "happy", "big", "tall", "hot", "cold", "sad", "little", "sharpened"];

    // ------------------- DOM elements -------------------
    const itemEmojiSpan = document.getElementById("itemEmoji");
    const itemNameSpan = document.getElementById("itemName");
    const dropZoneDiv = document.getElementById("dropZone");
    const feedbackDiv = document.getElementById("feedbackMsg");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetDropBtn = document.getElementById("resetDropBtn");
    const itemCounterSpan = document.getElementById("itemCounter");
    const adjectivesContainer = document.getElementById("adjectivesContainer");

    let currentIndex = 0;
    let currentCorrectAdjective = items[currentIndex].correct;

    // Update UI for current item (reset dropzone, emoji, sentence, clear feedback)
    function updateUIForCurrentItem() {
        const item = items[currentIndex];
        itemEmojiSpan.textContent = item.emoji;
        itemNameSpan.textContent = item.name;
        currentCorrectAdjective = item.correct;

        // reset blank area
        dropZoneDiv.textContent = "______";
        dropZoneDiv.classList.remove("drag-over");
        // friendly neutral feedback
        feedbackDiv.innerHTML = "✨ Drag an adjective into the blank! ✨";
        feedbackDiv.style.color = "#2a6b3a";
        feedbackDiv.style.background = "#f4e8db";

        // update counter
        itemCounterSpan.textContent = `${currentIndex + 1} / ${items.length}`;
    }

    // Validate and show feedback after drop
    function evaluateDrop(droppedAdjective) {
        if (droppedAdjective === currentCorrectAdjective) {
            feedbackDiv.innerHTML = "🎉 PERFECT MATCH! 🎉 That's absolutely correct! 🌟 Well done!";
            feedbackDiv.style.color = "#1f6d2b";
            feedbackDiv.style.background = "#e1f7e8";
            return true;
        } else {
            // provide hint with the correct word
            feedbackDiv.innerHTML = `❌ Not quite! “${droppedAdjective}” doesn't fit. ❌<br> 💡 Hint: The ${items[currentIndex].name.toLowerCase()} is “${currentCorrectAdjective}”. Try again!`;
            feedbackDiv.style.color = "#a12a2a";
            feedbackDiv.style.background = "#ffe2e2";
            return false;
        }
    }

    // ----- DRAG & DROP MECHANICS -----
    function makeAdjectivesDraggable() {
        const tiles = document.querySelectorAll(".adjective-tile");
        tiles.forEach(tile => {
            tile.setAttribute("draggable", "true");
            tile.removeEventListener("dragstart", dragStartHandler);
            tile.removeEventListener("dragend", dragEndHandler);
            tile.addEventListener("dragstart", dragStartHandler);
            tile.addEventListener("dragend", dragEndHandler);
        });
    }

    function dragStartHandler(e) {
        const adjective = e.target.getAttribute("data-adjective");
        if (adjective) {
            e.dataTransfer.setData("text/plain", adjective);
            e.dataTransfer.effectAllowed = "copy";
            e.target.classList.add("dragging");
        } else {
            e.preventDefault();
        }
    }

    function dragEndHandler(e) {
        e.target.classList.remove("dragging");
    }

    function setupDropZoneEvents() {
        dropZoneDiv.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            dropZoneDiv.classList.add("drag-over");
        });

        dropZoneDiv.addEventListener("dragleave", () => {
            dropZoneDiv.classList.remove("drag-over");
        });

        dropZoneDiv.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZoneDiv.classList.remove("drag-over");
            const draggedWord = e.dataTransfer.getData("text/plain");
            if (!draggedWord) return;

            // Fill the blank with dragged word
            dropZoneDiv.textContent = draggedWord;
            // Validate and show feedback
            evaluateDrop(draggedWord);
        });
    }

    // Reset only the blank without affecting navigation
    function resetCurrentBlank() {
        dropZoneDiv.textContent = "______";
        feedbackDiv.innerHTML = "🧹 Blank cleared! Now drag the correct adjective. 🧹";
        feedbackDiv.style.color = "#bc6f2c";
        feedbackDiv.style.background = "#fff2e2";
        setTimeout(() => {
            if (dropZoneDiv.textContent === "______" && feedbackDiv.innerHTML.includes("Blank cleared")) {
                feedbackDiv.innerHTML = "✨ Drag an adjective into the blank! ✨";
                feedbackDiv.style.color = "#2a6b3a";
                feedbackDiv.style.background = "#f4e8db";
            }
        }, 1800);
    }

    // Build draggable tiles from allAdjectives array
    function buildAdjectiveTiles() {
        adjectivesContainer.innerHTML = "";
        allAdjectives.forEach(adj => {
            const tile = document.createElement("div");
            tile.className = "adjective-tile";
            tile.textContent = adj;
            tile.setAttribute("data-adjective", adj);
            tile.setAttribute("draggable", "true");
            tile.addEventListener("dragstart", (e) => {
                e.dataTransfer.setData("text/plain", adj);
                e.dataTransfer.effectAllowed = "copy";
                tile.classList.add("dragging");
            });
            tile.addEventListener("dragend", (e) => {
                tile.classList.remove("dragging");
            });
            adjectivesContainer.appendChild(tile);
        });
        makeAdjectivesDraggable();
    }

    // Navigation: next with wrap option
    function goToNext() {
        if (currentIndex + 1 < items.length) {
            currentIndex++;
            updateUIForCurrentItem();
        } else {
            const userConfirm = confirm("🏆 Congratulations! You've completed all examples! 🏆\nPress OK to start from the beginning and practice again.");
            if (userConfirm) {
                currentIndex = 0;
                updateUIForCurrentItem();
            } else {
                feedbackDiv.innerHTML = "🎉 Amazing work! Use PREV to review or restart anytime. 🎉";
                feedbackDiv.style.background = "#fff1bf";
            }
        }
    }

    function goToPrev() {
        if (currentIndex - 1 >= 0) {
            currentIndex--;
            updateUIForCurrentItem();
        } else {
            const goLast = confirm("You're at the first card. Do you want to jump to the last card?");
            if (goLast) {
                currentIndex = items.length - 1;
                updateUIForCurrentItem();
            } else {
                feedbackDiv.innerHTML = "👉 This is the first example. Press NEXT to explore more! 👈";
                setTimeout(() => {
                    if (currentIndex === 0 && feedbackDiv.innerHTML.includes("first example")) {
                        feedbackDiv.innerHTML = "✨ Drag an adjective into the blank! ✨";
                    }
                }, 2000);
            }
        }
    }

    // Optional: click on dropzone for reminder
    function addDropzoneReminder() {
        dropZoneDiv.addEventListener("click", () => {
            if (dropZoneDiv.textContent !== "______") {
                feedbackDiv.innerHTML = "💡 You can replace the adjective by dragging a new one, or press 'Clear Blank' 💡";
                setTimeout(() => {
                    if (feedbackDiv.innerHTML.includes("Clear Blank")) {
                        if (dropZoneDiv.textContent === "______") {
                            feedbackDiv.innerHTML = "✨ Drag an adjective into the blank! ✨";
                        } else if (dropZoneDiv.textContent !== "______" && !feedbackDiv.innerHTML.includes("Perfect")) {
                            feedbackDiv.innerHTML = "Keep going! Find the perfect match!";
                        }
                    }
                }, 2200);
            }
        });
    }

    // Initialize everything
    function init() {
        buildAdjectiveTiles();
        setupDropZoneEvents();
        updateUIForCurrentItem();
        addDropzoneReminder();

        prevBtn.addEventListener("click", goToPrev);
        nextBtn.addEventListener("click", goToNext);
        resetDropBtn.addEventListener("click", resetCurrentBlank);
    }

    init();
</script>
</body>
</html>
